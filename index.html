<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>HEMIS Test</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#111;font-size:16px}
.topbar{background:#1565C0;color:white;display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:48px;position:sticky;top:0;z-index:200}
.logo{background:white;color:#1565C0;font-weight:800;font-size:13px;padding:3px 8px;border-radius:3px}
.tleft{display:flex;align-items:center;gap:10px}
.ttitle{font-size:14px;font-weight:500;opacity:.9}
.timerbar{background:#1976D2;display:flex;align-items:center;justify-content:space-between;padding:8px 16px;position:sticky;top:48px;z-index:199}
.tnum{font-size:24px;font-weight:700;color:white;letter-spacing:2px;font-variant-numeric:tabular-nums}
.ticons{display:flex;gap:18px}
.tico{background:none;border:none;color:white;font-size:22px;cursor:pointer;opacity:.85;padding:2px;line-height:1}
.timerbar.warn{background:#E65100}
.timerbar.danger{background:#B71C1C}
.sbar{height:4px;background:#ddd;position:sticky;top:96px;z-index:198}
.sfill{height:4px;background:#F9A825;width:0%;transition:width .08s linear}
.tabs{background:white;border-bottom:1px solid #e0e0e0;display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:100px;z-index:197}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:11px 14px;font-size:13px;font-weight:600;color:#78909C;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;flex-shrink:0;user-select:none}
.tab:hover{color:#1565C0}
.tab.active{color:#1565C0;border-bottom-color:#1565C0}
.atab.active{color:#2E7D32;border-bottom-color:#2E7D32}
.atab{color:#388E3C}
.content{max-width:700px;margin:0 auto;padding:10px 10px 80px}
.qblock{background:white;border-radius:8px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.qtext{padding:16px 16px 14px;font-size:16px;font-weight:500;line-height:1.55;color:#111;border-bottom:1px solid #f0f0f0}
.opt{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:1px solid #f5f5f5;transition:background .1s;-webkit-tap-highlight-color:transparent}
.opt:last-child{border-bottom:none}
.opt.sel{background:#FFF8E1}
.radio{width:22px;height:22px;border:2px solid #bdbdbd;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:border-color .15s}
.rdot{width:10px;height:10px;border-radius:50%;background:transparent;transform:scale(0);transition:all .15s}
.opt.sel .radio{border-color:#1565C0}
.opt.sel .rdot{background:#1565C0;transform:scale(1)}
.otxt{font-size:15.5px;line-height:1.5;color:#222}
.bottom{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e0e0e0;padding:8px 14px;z-index:200}
.bend{width:100%;padding:12px;background:#C62828;color:white;border:none;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.sbox{background:white;border-radius:8px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:8px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.sinp{flex:1;border:1.5px solid #e0e0e0;border-radius:6px;padding:8px 11px;font-size:15px;font-family:inherit;outline:none;color:#1a1a1a}
.sinp:focus{border-color:#1565C0}
.scnt{font-size:12px;color:#999;white-space:nowrap}
.aitm{background:white;border-radius:8px;margin-bottom:7px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.aq{padding:11px 13px;font-size:14px;font-weight:600;color:#1565C0;line-height:1.4;border-bottom:1px solid #f0f0f0}
.aa{padding:9px 13px;background:#E8F5E9;border-left:4px solid #43A047;display:flex;align-items:flex-start;gap:7px}
.achk{color:#43A047;font-size:16px;flex-shrink:0;margin-top:1px}
.atxt{font-size:14px;color:#1a1a1a;line-height:1.45}
.rwrap{display:flex;align-items:center;justify-content:center;min-height:60vh;padding:16px}
.rcard{background:white;border-radius:12px;overflow:hidden;width:100%;max-width:380px;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.rhead{background:#1565C0;color:white;text-align:center;padding:28px 20px}
.rcirc{width:108px;height:108px;border-radius:50%;border:4px solid rgba(255,255,255,.35);background:rgba(255,255,255,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 14px}
.rpct{font-size:34px;font-weight:800;line-height:1}
.rlbl{font-size:12px;opacity:.7}
.rbody{padding:18px}
.rgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.ri{background:#f5f7fa;border-radius:8px;padding:12px 6px;text-align:center}
.riv{font-size:24px;font-weight:700}
.ril{font-size:11px;color:#888;margin-top:2px}
.rbtns{display:flex;flex-direction:column;gap:8px}
.rbtn{width:100%;padding:11px;border-radius:6px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:300;padding:16px}
.overlay.show{display:flex}
.modal{background:white;border-radius:10px;padding:22px;width:100%;max-width:320px}
.modal h3{font-size:16px;margin-bottom:8px}
.modal p{font-size:14px;color:#555;line-height:1.5;margin-bottom:18px}
.mbtns{display:flex;gap:8px}
.mbtn{flex:1;padding:10px;border-radius:6px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
</style>
</head>

<div class="topbar">

  </div>
</div>

<script>
var ALL_GROUPS = [[{"q": "Quyidagilardan qaysi biri moliyaning obyekti hisoblanmaydi?", "o": ["Qimmatli qog’ozlar", "Markazlashgan pul fondlari", "Markazlashmagan pul fondlari", "Moliyaviy resurslar"], "a": 0}, {"q": "Moliyaning subyektlari to’liq keltirilgan javobni ko’rsating.", "o": ["Korxonalar, tashkilotlar, firmalar, turli xoʻjaliklar, moliyaviy vositachilar, xonadonlar, davlat idoralari", "korxonalar,turli xoʻjaliklar, moliyaviy vositachilar, xonadonlar,davlat idoralari", "turli xoʻjaliklar, moliyaviy vositachilar, xonadonlar,davlat idoralari", "korxonalar (firmalar), turli xoʻjaliklar, qimmqtli qog’ozlar, moliyaviy vositachilar, xonadonlar, davlat idoralari,"], "a": 0}, {"q": "Moliya quyidagilar o’rtasida vujudga keladigan pul munosabatlarini ifodalaydi:", "o": ["byudjet tizimiga soliqlarni to’lash va xarajatlarni byudjetdan moliyalashtirish davomida korxona va davlat o’rtasida", "markazlashtirilgan pul mablag’lari fondlaridan foydalanish jarayonida korxonalar o’rtasida", "korxonalar va fuqarolar o’rtasida byudjet mablag’larini shakllantirish jarayonida", "qiymatning tovar shaklidagi harakatiga bog’liq bo’lmasdan, aksincha, real pullarning harakatiga"], "a": 0}, {"q": "Siyosat davlat faoliyatining...", "o": ["barcha yo’nalishlarini qamrab oladi", "ayrim yo’nalishlarini qamrab oladi", "ayrim yo’nalishlarini qamrab olmaydi", "faqat siyosiy yo’nalishlarini qamrab oladi"], "a": 0}, {"q": "Quyidagilarni qaysi biri byudjet siyosatiga taaluqli emas?", "o": ["pul fondlari va daromadlarni shakllantirishning konkret shakllari va metodlariga bog‘liq ravishda bir necha bo‘g‘inlardan tashkil topadi", "byudjet xarajatlar qismining tarkibiy tuzilishi, turli darajadagi byudjetlar o‘rtasida xarajatlarni taqsimlash orqali ifodalanadi", "davlat qarzini boshqarish, byudjet defitsitini qoplash yo‘llarini aniqlash orqali ifodalanadi", "byudjetda konsentratsiya qilinadigan (to‘planadigan) YaIM hissasini aniqlash, mamlakat yuqori va quyi organlarining o‘zaro munosabatlari orqali ifodalanadi"], "a": 0}, {"q": "Soliq siyosatining asosiy vazifasi nimalardan iborat?", "o": ["Soliq yukini kamaytirish", "Soliqlarni byudjetdagi ulushini ko‘paytirish", "Soliq imtiyozlarini joriy etish", "Soliq turlarini ko‘paytirish"], "a": 0}, {"q": "Mamlakat iqtisodiyotidagi soliq yuki qanday aniqlanadi?", "o": ["Moliya yilidagi soliqlar miqdorini mamlakat YaIM miqdoriga nisbati orqali", "Moliya yilidagi byudjet daromadlarini mamlakatdagi soliqlar miqdoriga nisbati orqali", "Mamlakatda yaratilgan mahsulotlar hajmini davlat byudjeti daromadlariga nisbati", "Soliq stavkalarini hisobga olgan holda"], "a": 0}, {"q": "Quyidagilardan qaysi biri moliyaviy siyosatning tarkibiy qismiga kirmaydi?", "o": ["inflyatsion siyosat", "kredit siyosati", "sotsial moliyaviy siyosat", "byudjet-soliq siyosati"], "a": 0}, {"q": "Kredit siyosati natijasida kreditning arzonlashuvi nimalarga olib keladi?", "o": ["Takror ishlab chiqarish jarayoni subyektlari daromadlarining oshishiga", "Iqtisodiyotni izdan chiqishiga", "Byudjet daromadlarini kamayishiga", "Ishsizlikni ortisniga"], "a": 0}, {"q": "Sotsial moliyaviy siyosat Konstitutsiyaga muvofiq ...", "o": ["mamlakat aholisining huquqlarini moliyaviy jihatdan ta’minlash bilan bog’liq", "mamlakat ishchi va xizmatchilarining huquqlarini moliyaviy jihatdan ta’minlash bilan bog’liq", "mamlakat yoshlarining huquqlarini moliyaviy jihatdan ta’minlash bilan bog’liq", "mamlakat nafaqaxo’rlarining huquqlarini moliyaviy jihatdan ta’minlash"], "a": 0}, {"q": "Moliyaviy siyosat -", "o": ["iqtisodiy siyosatning tarkibiy qismi bo‘lib, moliyaviy resurslarni (manbalarni) jalb etish, ularni taqsimlash, ishga solish va foydalanishga yo‘naltirilgan barcha chora-tadbirlar yig‘indisi.", "markazlashgan va markazlashmagan fondlarni tashkil etish, taqsimlash va sarflash.", "davlatning vazifalari va funktsiyalari ham o‘zgartirish", "milliy xo‘jalik taraqqiyotida davlatning rolini oshirish"], "a": 0}, {"q": "Moliyaviy rejalashtirishning qanday turlari bo‘lishi mumkin?", "o": ["strategik moliyaviy rejalashtirish; joriy moliyaviy rejalashtirish", "taktik moliyaviy rejalashtirish; joriy moliyaviy rejalashtirish", "strategik moliyaviy rejalashtirish; muvozanatli moliyaviy rejalashtirish", "balansli moliyaviy rejalashtirish; joriy moliyaviy rejalashtirish"], "a": 0}, {"q": "Umumiy va eng oddiy ko‘rinishda, moliyaviy rejalashtirish deyilganda ...", "o": ["moliyaviy rejalarni tuzish va amalga oshirish jarayoni nazarda tutiladi", "moliyaviy rejalarni amalga oshirish jarayoni nazarda tutiladi", "moliyaviy rejalarni tuzish jarayoni nazarda tutiladi", "moliyaviy rejalarni tuzish va amalga oshirish jarayoni nazarda tutilmaydi"], "a": 0}, {"q": "Moliyaviy siyosatni ishlab chiqishda quyidagilardan qaysi birining bo‘lishi ahamiyatga ega emas?", "o": ["ijtimoiy ehtiyojlar va ularni qondirish choralarini aniqlagan holda moliyaviy resurslardan foydalanish", "taqsimlash munosabatlarining subyektlarini tanlash, ya’ni moliyaviy resurslarning egalari va taqsimlovchilarini tanlash", "moliyaviy resurslarni shakllantirishning manbalari va metodlarini tanlash", "davlatning funksiyalariga bog‘liq ravishda davlat ixtiyoridagi moliyaviy resurslarning markazlashtirilish darajasini aniqlash"], "a": 0}, {"q": "Moliyaviy siyosatning asosiy maqsadi ...", "o": ["jamiyatning sotsial-iqtisodiy taraqqiyoti, aholi turmush darajasi va sifatini oshirish uchun moliyaviy sharoitlarni yaratishdir", "jamiyatning iqtisodiy taraqqiyoti, aholi turmush darajasi va sifatini oshirish uchun moliyaviy sharoitlarni yaratishdir", "jamiyatning sotsial taraqqiyoti, aholi turmush darajasi va sifatini oshirish uchun moliyaviy sharoitlarni yaratishdir", "jamiyatning ijtimoiy taraqqiyoti va aholi turmush darajasini oshirish uchun moliyaviy sharoitlarni yaratishdir"], "a": 0}, {"q": "Moliyaviy siyosatning mazmuni...", "o": ["u qamrab olishi mumkin bo‘lgan moliyaviy munosabatlar rivojlanishi yo‘nalishlarining umumiy kompleksi bilan belgilanadi", "u qamrab olishi mumkin bo‘lgan ijtimoiy munosabatlar rivojlanishi yo‘nalishlarining xususiy kompleksi bilan belgilanadi", "u qamrab olishi mumkin bo‘lgan iqtisodiy munosabatlar rivojlanishi yo‘nalishlarining umumiy kompleksi bilan belgilanadi", "u qamrab olishi mumkin bo‘lgan siyosiy munosabatlar rivojlanishi yo‘nalishlarining xususiy kompleksi bilan belgilanadi"], "a": 0}, {"q": "Nazariya va amaliyotda moliyaviy bashoratlash ikkiga ajratiladi:", "o": ["o‘rta muddatli (5-10 yillik) moliyaviy bashoratlash; uzoq muddatli (10 yildan ortiq) moliyaviy bashoratlash", "o‘rta muddatli (3 yilgacha) moliyaviy bashoratlash; uzoq muddatli (5 yilgacha) moliyaviy bashoratlash", "o‘rta muddatli (5-7 yillik) moliyaviy bashoratlash; uzoq muddatli (10 yilgacha) moliyaviy bashoratlash", "o‘rta muddatli (7-10 yillik) moliyaviy bashoratlash; uzoq muddatli (10 yildan ortiq) moliyaviy bashoratlash"], "a": 0}, {"q": "Nodavlat moliyaviy nazorati nechta turga bo‘linadi?", "o": ["uchga bo‘linadi: ichki (firma ichidagi), jamoatchilik, mustaqil auditorlik", "ikkiga bo‘linadi: tashqi va auditorlik nazorati", "ikkiga bo‘linadi: ichki (firma ichidagi) va tashqi (auditorlik)", "ikkiga bo‘linadi: firma ichidagi va korporativ moliyaviy nazarat"], "a": 0}, {"q": "Notijorat asosda xo‘jalik yuritishning asosiy xususiyatlariga quyidagilardan qaysi biri kirmaydi?", "o": ["moliyaviy bozorning resurslaridan foydalangan holda investitsiyalashtirish uchun zarur bo‘lgan mablag‘larni jalb etish", "e’lon qilingan maqsadlarga erishish uchun olingan foydadan vosita sifatida foydalanish", "faoliyatning foyda olishga emas, balki ma’lum bir missiyaga erishishga yo‘naltirilganligi", "bozor xo‘jaligining iqtisodiy samaradorligi va faoliyatning sotsial samaradorligini birgalikda qo‘shib olib borish"], "a": 0}, {"q": "Pul siyosati orqali qanday vazifalar amalaga oshiriladi?", "o": ["muomaladagi pul miqdori tovarlar massasi miqdoriga mos kelmagan sharoitda pul massasining yetmagan qismini qog‘oz pullar hisobidan yoki xorijiy valyuta hisobidan to‘ldirish", "emissiya // ── Barcha state o'zgaruvchilari birinchi e'lon qilinadi ──
var curG = 0;
var curSec = "test";
var done = false;
var sq = "";
var timeLeft = 5400;
var timerInt = null;
var ans = [];
var SG = []; // Shuffled groups

function shuffle(q) {
  var idx = q.o.map(function(_,i){ return i; });
  for (var i = idx.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var t = idx[i]; idx[i]=idx[j]; idx[j]=t;
  }
  return { q: q.q, o: idx.map(function(i){ return q.o[i]; }), a: idx.indexOf(q.a) };
}

function initData() {
  SG = ALL_GROUPS.map(function(g){ return g.map(shuffle); });
  ans = ALL_GROUPS.map(function(g){ return new Array(g.length).fill(null); });
}

// ── Event bindings ──
document.getElementById("btnX").addEventListener("click", openModal);
document.getElementById("btnEnd").addEventListener("click", openModal);
document.getElementById("btnNo").addEventListener("click", closeModal);
document.getElementById("btnYes").addEventListener("click", submitTest);

window.addEventListener("scroll", function(){
  var st = window.scrollY||document.documentElement.scrollTop;
  var dh = document.documentElement.scrollHeight - window.innerHeight;
  var el = document.getElementById("sfill");
  if (el) el.style.width = (dh>0 ? st/dh*100 : 0)+"%";
});

function openModal() {
  var total=0, answered=0;
  ans.forEach(function(g){ g.forEach(function(a){ total++; if(a!==null) answered++; }); });
  var left = total-answered;
  document.getElementById("mmsg").innerHTML = left>0
    ? "Hali <strong>"+left+"</strong> ta savolga javob bermagansiz. Yakunlashni tasdiqlaysizmi?"
    : "Barcha savollarga javob berdingiz. Yakunlashni tasdiqlaysizmi?";
  document.getElementById("overlay").classList.add("show");
}
function closeModal(){ document.getElementById("overlay").classList.remove("show"); }

function submitTest(){
  closeModal(); clearInterval(timerInt); done=true;
  curSec="result"; syncTabs(); renderResult();
}

function buildTabs(){
  var el = document.getElementById("tabs");
  el.innerHTML = "";
  ALL_GROUPS.forEach(function(g,i){
    var d = document.createElement("div");
    d.className = "tab"+(i===curG&&curSec==="test"?" active":"");
    d.id = "t"+i;
    d.textContent = (i+1)+"-guruh ("+g.length+")";
    d.addEventListener("click", (function(x){ return function(){
      curSec="test"; curG=x; render(); syncTabs(); window.scrollTo(0,0);
    };})(i));
    el.appendChild(d);
  });
  var a = document.createElement("div");
  a.className = "tab atab"+(curSec==="answers"?" active":"");
  a.id = "tans";
  a.textContent = "Javoblar";
  a.addEventListener("click", function(){
    curSec="answers"; render(); syncTabs(); window.scrollTo(0,0);
  });
  el.appendChild(a);
}

function syncTabs(){
  ALL_GROUPS.forEach(function(_,i){
    var t=document.getElementById("t"+i);
    if(t) t.className="tab"+(i===curG&&curSec==="test"?" active":"");
  });
  var ta=document.getElementById("tans");
  if(ta) ta.className="tab atab"+(curSec==="answers"?" active":"");
}

function render(){
  if(curSec==="result"){ renderResult(); return; }
  if(curSec==="answers"){ renderAnswers(); return; }
  renderGroup(curG);
}

function renderGroup(gi){
  var group = SG[gi];
  var a = ans[gi];
  var frag = document.createDocumentFragment();
  group.forEach(function(q,qi){
    var num = gi*30+qi+1;
    var block = document.createElement("div");
    block.className="qblock"; block.id="qb-"+gi+"-"+qi;
    var qtxt = document.createElement("div");
    qtxt.className="qtext"; qtxt.innerHTML=num+". "+q.q;
    block.appendChild(qtxt);
    q.o.forEach(function(opt,oi){
      var sel = a[qi]===oi;
      var row = document.createElement("div");
      row.className="opt"+(sel?" sel":"");
      var radio = document.createElement("div");
      radio.className="radio";
      if(sel) radio.style.borderColor="#1565C0";
      var dot = document.createElement("div");
      dot.className="rdot";
      if(sel){ dot.style.background="#1565C0"; dot.style.transform="scale(1)"; }
      radio.appendChild(dot);
      var otxt = document.createElement("div");
      otxt.className="otxt"; otxt.innerHTML=opt;
      row.appendChild(radio); row.appendChild(otxt);
      row.addEventListener("click",(function(g,q,o){ return function(){ pick(g,q,o); }; })(gi,qi,oi));
      block.appendChild(row);
    });
    frag.appendChild(block);
  });
  var c=document.getElementById("content");
  c.innerHTML=""; c.appendChild(frag);
  document.getElementById("bottom").style.display="block";
}

function pick(gi,qi,oi){
  if(done) return;
  ans[gi][qi]=oi;
  var block=document.getElementById("qb-"+gi+"-"+qi);
  if(!block) return;
  block.querySelectorAll(".opt").forEach(function(el,i){
    var s=i===oi;
    el.className="opt"+(s?" sel":"");
    var rd=el.querySelector(".rdot"), ro=el.querySelector(".radio");
    if(rd){ rd.style.background=s?"#1565C0":"transparent"; rd.style.transform=s?"scale(1)":"scale(0)"; }
    if(ro) ro.style.borderColor=s?"#1565C0":"#bdbdbd";
  });
}

function renderAnswers(){
  var all=[];
  ALL_GROUPS.forEach(function(g,gi){
    g.forEach(function(q,qi){ all.push({n:gi*30+qi+1, q:q.q, a:q.o[q.a]}); });
  });
  var c=document.getElementById("content");
  if(!document.getElementById("ans-wrap")){
    c.innerHTML="";
    var sbox=document.createElement("div"); sbox.className="sbox"; sbox.id="ans-wrap";
    var inp=document.createElement("input"); inp.className="sinp"; inp.id="sinp";
    inp.type="text"; inp.placeholder="Savol yoki javob boʻyicha qidiring...";
    var cnt=document.createElement("span"); cnt.className="scnt"; cnt.id="scnt";
    inp.addEventListener("input",function(){ sq=this.value; showFiltered(all); });
    sbox.appendChild(inp); sbox.appendChild(cnt); c.appendChild(sbox);
    var list=document.createElement("div"); list.id="alist"; c.appendChild(list);
  }
  showFiltered(all);
  document.getElementById("bottom").style.display="none";
}

function showFiltered(all){
  var v=sq.toLowerCase();
  var filtered=v?all.filter(function(x){ return x.q.toLowerCase().indexOf(v)>=0||x.a.toLowerCase().indexOf(v)>=0; }):all;
  var cnt=document.getElementById("scnt");
  if(cnt) cnt.textContent=filtered.length+" ta";
  var list=document.getElementById("alist");
  if(!list) return;
  list.innerHTML="";
  filtered.forEach(function(x){
    var item=document.createElement("div"); item.className="aitm";
    var aq=document.createElement("div"); aq.className="aq"; aq.innerHTML=x.n+". "+x.q;
    var aa=document.createElement("div"); aa.className="aa";
    aa.innerHTML="<span class='achk'>&#10004;</span><span class='atxt'>"+x.a+"</span>";
    item.appendChild(aq); item.appendChild(aa); list.appendChild(item);
  });
}

function renderResult(){
  var correct=0,wrong=0,skip=0,total=0;
  ALL_GROUPS.forEach(function(g,gi){
    g.forEach(function(q,qi){
      total++;
      if(ans[gi][qi]===null) skip++;
      else if(ans[gi][qi]===SG[gi][qi].a) correct++;
      else wrong++;
    });
  });
  var pct=Math.round(correct/total*100);
  var c=document.getElementById("content");
  c.innerHTML=
    "<div class='rwrap'><div class='rcard'><div class='rhead'>"+
    "<div class='rcirc'><div class='rpct'>"+pct+"%</div><div class='rlbl'>natija</div></div>"+
    "<h2>Test yakunlandi</h2><p>Moliya fani bo&#39;yicha</p></div>"+
    "<div class='rbody'><div class='rgrid'>"+
    "<div class='ri'><div class='riv' style='color:#2E7D32'>"+correct+"</div><div class='ril'>To&#39;g&#39;ri</div></div>"+
    "<div class='ri'><div class='riv' style='color:#C62828'>"+wrong+"</div><div class='ril'>Noto&#39;g&#39;ri</div></div>"+
    "<div class='ri'><div class='riv' style='color:#888'>"+skip+"</div><div class='ril'>Javobsiz</div></div>"+
    "</div><div class='rbtns'>"+
    "<button class='rbtn' style='background:#1565C0;color:white' id='rba'>Javoblarni ko&#39;rish</button>"+
    "<button class='rbtn' style='background:#f0f0f0;color:#555;border:1.5px solid #ddd' id='rbr'>Qayta boshlash</button>"+
    "</div></div></div></div>";
  document.getElementById("bottom").style.display="none";
  document.getElementById("rba").addEventListener("click",function(){ curSec="answers"; syncTabs(); render(); window.scrollTo(0,0); });
  document.getElementById("rbr").addEventListener("click",restart);
}

function restart(){
  done=false; sq=""; curG=0; curSec="test"; timeLeft=5400;
  initData(); clearInterval(timerInt); startTimer(); buildTabs(); render(); window.scrollTo(0,0);
}

function startTimer(){
  updateTimer();
  timerInt=setInterval(function(){ timeLeft--; updateTimer(); if(timeLeft<=0){ clearInterval(timerInt); submitTest(); } },1000);
}

function updateTimer(){
  var m=Math.floor(timeLeft/60), s=timeLeft%60;
  document.getElementById("tnum").textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
  var bar=document.getElementById("timerbar");
  bar.className="timerbar";
  if(timeLeft<=300) bar.classList.add("danger");
  else if(timeLeft<=600) bar.classList.add("warn");
}

// ── START ──
initData();
buildTabs();
render();
startTimer();
</script>
</body>
</html>
